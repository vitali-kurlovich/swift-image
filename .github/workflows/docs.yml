# Simple workflow for deploying static content to GitHub Pages
name: Generate DocC

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      
      - name: Latest Swift
        uses: SwiftyLab/setup-swift@latest

      - name: Make dir for static content
        run: mkdir pages && mkdir ./pages/lists && mkdir ./pages/caches
      
      - name: Generate DocC WarpTransform
        run: swift package --allow-writing-to-directory ./.docs generate-documentation --target WarpTransform --output-path ./.docs --disable-indexing --transform-for-static-hosting --hosting-base-path swift-image/warp-transform

      - name: Copy generated content into pages dir
        run: cp -r ./.docs/* ./pages/warp-transform 

      - name: Generate DocC WarpMetal
        run: swift package --allow-writing-to-directory ./.docs generate-documentation --target WarpMetal --output-path ./.docs --disable-indexing --transform-for-static-hosting --hosting-base-path swift-image/warp-metal

      - name: Copy generated content into pages dir
        run: cp -r ./.docs/* ./pages/warp-metal 

      - name: Generate DocC WarpSwiftUI
        run: swift package --allow-writing-to-directory ./.docs generate-documentation --target WarpSwiftUI --output-path ./.docs --disable-indexing --transform-for-static-hosting --hosting-base-path swift-image/warp-swiftui

      - name: Copy generated content into pages dir
        run: cp -r ./.docs/* ./pages/warp-swiftui 

      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: 'pages'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
